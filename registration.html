<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FL Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="registration.css">
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="World Cup Madness">

<h1>WORLD CUP MADNESS</h1>

<h2>Fantasy League Registration</h2>

<form id="registerForm">

<input type="text" id="username" placeholder="username" required>

<input type="date" id="dob" placeholder="Date of birth" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="country" placeholder="Country" required>

<input type="tel" id="whatsapp" placeholder="WhatsApp Number" required>

<button type="submit" class="submit-btn">
LET'S GO
</button>

</form>
<h5>*click once & wait few second for conformation pop-up</h5>
</div>
