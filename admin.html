<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup Madness Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="admin-container">

    <img src="logo.png" class="logo" alt="Logo">

    <h1>⚽ WORLD CUP MADNESS</h1>

    <h2>Admin Panel</h2>

    <!-- Update Player Rating -->

    <div class="card">

        <h3>Update Player Rating</h3>

        <input
        type="text"
        id="playerName"
        placeholder="Player Name">

        <input
        type="number"
        step="0.1"
        min="0"
        max="10"
        id="playerRating"
        placeholder="Rating (0 - 10)">

        <button id="updateBtn">
            UPDATE RATING
        </button>

    </div>

    <!-- Calculate Leaderboard -->

    <div class="card">

        <h3>Fantasy Points</h3>

        <p>
            After updating all player ratings,
            click below to calculate points
            and update the leaderboard.
        </p>

        <button id="calculateBtn">
            UPDATE LEADERBOARD
        </button>

    </div>

</div>

<footer>

<p>
©2026 WORLDCUP MADNESS |
Admin Dashboard |
By GourabDev
</p>

</footer>

<script src="admin.js"></script>

</body>

</html>
