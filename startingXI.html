<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup Madness Fantasy</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="strting.css">
</head>

<body>

<h1>⚽ WORLD CUP MADNESS DREAM XI ⚽</h1>

<div class="team-info">
    <div>MANAGER: None</div>
    <div>Captain: None</div>
    <div>Vice Captain: None</div>
</div>

<div class="pitch">

<div class="row">
    <div class="player-slot gk">GK</div>
</div>

<div class="row">
    <div class="player-slot">DEF</div>
    <div class="player-slot">DEF</div>
    <div class="player-slot">DEF</div>
    <div class="player-slot">DEF</div>
</div>

<div class="row">
    <div class="player-slot">MID</div>
    <div class="player-slot">MID</div>
    <div class="player-slot">MID</div>
</div>

<div class="row">
    <div class="player-slot">FW</div>
    <div class="player-slot">FW</div>
    <div class="player-slot">FW</div>
</div>

</div>

<h2>PLAYER MARKET</h2>

<div class="market">

<div class="player-card">
    <img src="players/messi.png">
    <h3>Messi</h3>
    <p>🇦🇷 Argentina</p>
    <span>Forward</span>
    <button>Select</button>
</div>

<div class="player-card">
    <img src="players/mbappe.png">
    <h3>Mbappé</h3>
    <p>🇫🇷 France</p>
    <span>Forward</span>
    <button>Select</button>
</div>

<div class="player-card">
    <img src="players/bellingham.png">
    <h3>Bellingham</h3>
    <p>🏴 England</p>
    <span>Midfielder</span>
    <button>Select</button>
</div>

<div class="player-card">
    <img src="players/haaland.png">
    <h3>Haaland</h3>
    <p>🇳🇴 Norway</p>
    <span>Forward</span>
    <button>Select</button>
</div>

</div>

<button class="save-btn">
SAVE DREAM XI
</button>

</body>
</html>
